name: tapmate
description: "TapMate - Social Media App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  # ========== FIREBASE - COMPATIBLE VERSIONS ==========
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.7

  # ========== CLOUDINARY (Image Upload) ==========
  cloudinary_public: ^0.23.1  # ✅ Simple Cloudinary integration
  # cloudinary: ^1.0.0  # ❌ DUPLICATE - Remove this (dono ek saath use mat karo)

  # ========== UI & UTILITIES ==========
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  http: ^1.1.2
  http_parser: ^4.0.2  # ✅ HTTP parsing ke liye
  intl: ^0.18.1
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.7.0

  # ========== SOCIAL LOGIN ==========
  google_sign_in: 5.4.4  # ✅ Exact version for type cast fix
  flutter_facebook_auth: ^6.0.4

  # ========== MEDIA & RECORDING ==========
  record: ^6.0.0
  permission_handler: ^11.0.1
  audioplayers: ^5.2.1
  wave: ^0.2.2
  video_player: ^2.8.1
  file_picker: ^8.0.3
  path_provider: ^2.1.1

  # ========== SHARE & OPEN FILES ==========
  share_plus: ^7.2.0
  open_filex: ^4.3.2

  # ========== REAL-TIME COMMUNICATION ==========
  agora_rtc_engine: ^6.3.0

  # ========== EMOJI PICKER ==========
  emoji_picker_flutter: ^3.1.0

  # ========== ONBOARDING TOUR ==========
  showcaseview: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/google_logo.png
    - assets/icons/facebook_logo.png