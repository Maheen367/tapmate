name: tapmate
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase - STABLE VERSIONS
  firebase_core: ^2.15.0
  firebase_auth: ^4.7.0
  cloud_firestore: ^4.8.0
  firebase_storage: ^11.2.0

  # UI & Utilities
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  image_picker: ^1.0.4
  http: ^1.1.0
  intl: ^0.18.1

  # Emoji Picker
  emoji_picker_flutter: ^3.1.0

  # Social Login
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.2.0

  # Audio/Video
  record: ^6.0.0
  permission_handler: ^11.0.1
  audioplayers: ^5.2.1
  wave: ^0.2.2
  video_player: ^2.8.1
  share_plus: ^7.2.0
  open_filex: ^4.3.2
  agora_rtc_engine: ^6.3.0

  # Other Packages
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.1
  font_awesome_flutter: ^10.7.0
  file_picker: ^8.1.2
  path_provider: ^2.1.3
  showcaseview: ^3.0.0
  cloudinary_public: ^0.23.1
  http_parser: ^4.0.2
  flutter_downloader: ^1.11.5
  youtube_explode_dart: ^2.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/google_logo.png
    - assets/icons/facebook_logo.png