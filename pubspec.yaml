name: tapmate
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase - COMPATIBLE VERSIONS
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4  # Downgrade to version compatible with storage
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.7  # Upgrade to version compatible with auth

  # UI & Utilities
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  http: ^1.1.2
  intl: ^0.18.1

  # Emoji Picker
  emoji_picker_flutter: ^3.1.0

  # Social Login - Use stable versions
  google_sign_in: 5.4.4  # CRITICAL: Use exact version 5.4.4 to fix type cast error
  flutter_facebook_auth: ^6.0.4

  # Other Packages
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.7.0
  file_picker: ^8.0.3
  path_provider: ^2.1.1
  showcaseview: ^3.0.0
  cloudinary_public: ^0.23.1
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/google_logo.png
    - assets/icons/facebook_logo.png